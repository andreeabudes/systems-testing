name: Run unit tests
 
on:
  push:
    branches:
      - main
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
 
      - run: pip install pytest
 
      - run: pytest -v laboratories/cicd-documentation/test_tree.py
